# kube-prometheus-stack values so PodMonitors from KubeAI are discovered.
# Docs: docs/observability.md
# Upstream: https://www.kubeai.org/how-to/observability-with-prometheus-stack/
#
# Usage:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f deploy/observability/values-prometheus.yaml
#
# KubeAI PodMonitor is already enabled in deploy/kubeai/values-gpu.yaml:
#   metrics.prometheusOperator.vLLMPodMonitor.enabled=true
#
# Grafana dashboard: examples/observability/vllm-grafana-dashboard.json

prometheus:
  prometheusSpec:
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
