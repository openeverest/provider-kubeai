# Hugging Face token for gated models (e.g. meta-llama/*).
# Replace REPLACE_ME, then:
#   kubectl apply -f deploy/kubeai/hf-token-secret.yaml
#
# Wire into model pods via KubeAI (envFrom / model env) or provider Sync
# once envFrom is supported. Never commit a real token.
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: default
type: Opaque
stringData:
  HF_TOKEN: "REPLACE_ME"
