name: Feature request
description: Propose a new capability for the KubeAI provider
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What do you want and why (1–3 sentences).
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Concrete changes (Helm, UI, Sync, API, docs, etc.).
      placeholder: |
        - …
        - …
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Done when
      description: Checklist for “done”.
      placeholder: |
        - [ ] …
        - [ ] …
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Alternatives, links, related files/issues (optional).
